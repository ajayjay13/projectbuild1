name: New inspection report
description: Add a CMC food safety inspection post to the map
title: "[inspection] "
labels: ["inspection", "needs-review"]
body:
  - type: dropdown
    id: kitchen_type
    attributes:
      label: Establishment type
      options:
        - dedicated
        - cloud_kitchen
    validations:
      required: true

  - type: input
    id: primary_name
    attributes:
      label: Establishment / firm name
      description: The name on the CMC post, e.g. "Reddy Catering Services"
    validations:
      required: true

  - type: input
    id: brand_names
    attributes:
      label: Ordering-app brand name(s)
      description: Comma-separated if a cloud kitchen serves multiple brands, e.g. "Shree Dwaraka Grand (Zomato), XYZ Biryani (Swiggy)"
    validations:
      required: false

  - type: input
    id: address
    attributes:
      label: Address / landmark
      description: As written in the CMC post — used for geocoding if no Maps link is given below
    validations:
      required: true

  - type: input
    id: maps_url
    attributes:
      label: Google Maps link (optional, more accurate)
      description: Paste the location link from Google Maps (share > copy link). Overrides the address field for pinpointing if provided.
      placeholder: "https://maps.app.goo.gl/xxxx or https://www.google.com/maps/place/..."
    validations:
      required: false

  - type: input
    id: date
    attributes:
      label: Inspection date
      description: DD.MM.YYYY as shown in the post
    validations:
      required: true

  - type: input
    id: score
    attributes:
      label: Hygiene score
      description: 'As shown in the post — any format works, e.g. "106/114 Marks (93%)", "93%", or just "93". Leave blank if CMC didn''t publish one.'
    validations:
      required: false

  - type: textarea
    id: good_practices
    attributes:
      label: Good practices observed
      description: One per line
    validations:
      required: false

  - type: textarea
    id: violations
    attributes:
      label: Violations / observations
      description: One per line
    validations:
      required: false

  - type: input
    id: action_taken
    attributes:
      label: Action taken
      description: e.g. "Improvement notice issued", "FSSAI licence suspended"
    validations:
      required: false

  - type: input
    id: source_url
    attributes:
      label: Source post URL
      description: Link to the @CMC_Offcl post — required for verification
    validations:
      required: true

  - type: input
    id: media_urls
    attributes:
      label: Photo/video URLs
      description: Comma-separated links to media in the source post (not re-uploaded, just linked)
    validations:
      required: false
