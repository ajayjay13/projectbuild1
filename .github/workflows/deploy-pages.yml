name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "data/**"
      - "site/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_run:
    workflows: ["Process inspection report"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Copy dataset into site
        run: cp data/inspections.geojson site/inspections.geojson

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4
